<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOKİ Dağıtım</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#e8e8e8;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOOLBAR ── */
#toolbar{
  background:#1a1a1a;border-bottom:2px solid #E63329;
  padding:0 14px;height:48px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;z-index:20;
}
.badge{background:#E63329;color:#fff;font-weight:900;font-size:14px;letter-spacing:3px;padding:3px 10px;flex-shrink:0}
.tb-sep{width:1px;height:24px;background:#2a2a2a;margin:0 2px}
.tb-btn{
  padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:1px;
  border:1px solid #2a2a2a;background:transparent;color:#888;
  cursor:pointer;transition:all .2s;white-space:nowrap;height:32px;
  display:flex;align-items:center;gap:5px;
}
.tb-btn:hover{border-color:#aaa;color:#e8e8e8}
.tb-btn.active{background:#E63329;border-color:#E63329;color:#fff}
.tb-btn.green{background:#2a7a4a;border-color:#2a7a4a;color:#fff}
#tb-info{margin-left:auto;font-size:11px;color:#444;font-family:monospace;white-space:nowrap}

/* ── MAP AREA ── */
#map-area{flex:1;position:relative;overflow:hidden;background:#0a0a0a;cursor:default}
#map-ph{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  border:3px dashed #2a2a2a;cursor:pointer;transition:all .2s;
}
#map-ph:hover{border-color:#E63329}
#map-ph input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#map-ph .ph-icon{font-size:60px;opacity:.2}
#map-ph p{color:#444;font-size:14px}
#map-ph small{color:#333;font-size:11px}

#map-wrap{position:absolute;transform-origin:0 0;display:none}
#plan-img{display:block;user-select:none;pointer-events:none}

/* SVG overlay */
#svg-ol{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#svg-ol.can-draw{pointer-events:all;cursor:crosshair}

/* Block badge on map */
.blok-badge{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;user-select:none;z-index:5;
}
.blok-badge .bb-circle{
  width:48px;height:48px;border-radius:50%;
  background:#E63329;border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;color:#fff;text-align:center;
  line-height:1.1;padding:4px;
  box-shadow:0 3px 14px rgba(230,51,41,.5);
  transition:transform .15s,box-shadow .15s;
}
.blok-badge:hover .bb-circle{transform:scale(1.12);box-shadow:0 6px 20px rgba(230,51,41,.7)}
.blok-badge .bb-count{
  margin-top:3px;background:#0f0f0f;color:#e8e8e8;
  font-size:10px;font-family:monospace;padding:2px 7px;
  border:1px solid #E63329;white-space:nowrap;
}

/* ── ZOOM BUTTONS ── */
#zoom-wrap{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zbtn{
  width:38px;height:38px;background:#1a1a1a;border:1px solid #2a2a2a;
  color:#e8e8e8;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;border-radius:2px;
}
.zbtn:hover{background:#E63329}

/* ── DRAW HINT BAR ── */
#draw-bar{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;border:1px solid #f5c842;
  padding:7px 16px;font-size:11px;font-family:monospace;color:#f5c842;
  display:none;align-items:center;gap:10px;z-index:15;white-space:nowrap;
}
#draw-bar.show{display:flex}
#draw-bar button{padding:3px 10px;border:1px solid #E63329;background:transparent;color:#E63329;font-size:10px;cursor:pointer}

/* ── POPUPS ── */
.popup{
  position:fixed;background:#1a1a1a;border:1px solid #2a2a2a;border-top:2px solid #E63329;
  padding:20px;z-index:50;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
.popup.show{display:block}
.popup h3{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:14px;color:#e8e8e8}
.popup label{font-size:10px;color:#555;font-family:monospace;display:block;margin-bottom:4px}
.popup input,.popup select,.popup textarea{
  width:100%;background:#111;border:1px solid #2a2a2a;color:#e8e8e8;
  font-family:'Segoe UI',sans-serif;font-size:13px;padding:8px 10px;
  outline:none;margin-bottom:10px;
}
.popup input:focus,.popup select:focus{border-color:#E63329}
.popup-btns{display:flex;gap:6px;margin-top:4px}
.popup-btns button{flex:1;padding:8px;font-weight:700;font-size:12px;border:none;cursor:pointer}
.btn-ok{background:#E63329;color:#fff}
.btn-ok:hover{background:#c8241b}
.btn-cancel{background:#2a2a2a;color:#888}
.btn-cancel:hover{background:#333;color:#e8e8e8}
.btn-del{background:#2a2a2a;color:#E63329;border:1px solid #E63329!important;border:none}

/* ── BLOK POPUP (customer list) ── */
#blok-popup{min-width:320px;max-width:380px}
.bp-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bp-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.bp-title{font-size:15px;font-weight:700;flex:1}
.bp-close{background:transparent;border:none;color:#555;font-size:18px;cursor:pointer;line-height:1}
.bp-close:hover{color:#e8e8e8}
.musteri-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px solid #1e1e1e;
}
.musteri-row:last-child{border-bottom:none}
.m-order{font-size:10px;color:#444;font-family:monospace;width:20px;flex-shrink:0}
.m-info{flex:1}
.m-name{font-size:13px;font-weight:600}
.m-note{font-size:10px;color:#555;font-family:monospace}
.m-teslim{
  padding:3px 9px;font-size:10px;font-weight:700;
  border:1px solid #2a2a2a;background:transparent;color:#666;
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.m-teslim:hover{border-color:#4caf82;color:#4caf82}
.m-teslim.done{background:#4caf82;border-color:#4caf82;color:#fff}
.m-edit,.m-del{
  width:22px;height:22px;background:transparent;border:1px solid #2a2a2a;
  color:#555;font-size:11px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;flex-shrink:0;
}
.m-edit:hover{border-color:#aaa;color:#e8e8e8}
.m-del:hover{border-color:#E63329;color:#E63329}
.add-m-row{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #2a2a2a}
.add-m-row input{flex:1;background:#111;border:1px solid #2a2a2a;color:#e8e8e8;font-size:12px;padding:7px 10px;outline:none}
.add-m-row input:focus{border-color:#E63329}
.add-m-row button{padding:7px 12px;background:#E63329;border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
.add-m-row button:hover{background:#c8241b}

/* ── DAGITIM PANEL ── */
#dagitim-panel{
  position:absolute;top:0;right:0;bottom:0;width:300px;
  background:#1a1a1a;border-left:1px solid #2a2a2a;
  display:none;flex-direction:column;z-index:15;
}
#dagitim-panel.show{display:flex}
#dp-header{padding:14px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:8px}
#dp-header h3{font-size:13px;font-weight:700;letter-spacing:1px;flex:1}
#dp-close{background:transparent;border:none;color:#555;font-size:18px;cursor:pointer}
#dp-close:hover{color:#e8e8e8}
#dp-body{flex:1;overflow-y:auto;padding:10px}
.dp-item{
  background:#111;border:1px solid #2a2a2a;
  padding:10px 12px;margin-bottom:6px;
}
.dp-item.teslim{border-left:3px solid #4caf82;opacity:.65}
.dp-order{font-size:10px;color:#555;font-family:monospace;margin-bottom:4px}
.dp-name{font-size:13px;font-weight:700}
.dp-blok{font-size:10px;color:#555;font-family:monospace;margin-top:2px;margin-bottom:8px}
.dp-actions{display:flex;gap:4px}
.dp-up,.dp-dn{
  width:26px;height:26px;background:transparent;border:1px solid #2a2a2a;
  color:#666;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.dp-up:hover,.dp-dn:hover{border-color:#aaa;color:#e8e8e8}
.dp-teslim{
  flex:1;padding:6px;font-size:11px;font-weight:700;
  border:1px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;
}
.dp-teslim:hover{border-color:#4caf82;color:#4caf82}
.dp-teslim.done{background:#4caf82;border-color:#4caf82;color:#fff}
#dp-footer{padding:12px;border-top:1px solid #2a2a2a;font-family:monospace;font-size:11px;color:#444;line-height:2}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a2a}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="badge">TOKİ</div>
  <div class="tb-sep"></div>
  <label class="tb-btn" style="cursor:pointer">
    🗺 HARİTA YÜKLE
    <input type="file" accept="image/*" style="display:none" onchange="loadImg(this)">
  </label>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-draw" onclick="startDraw()">✏ BLOK ÇİZ</button>
  <button class="tb-btn" id="btn-dagitim" onclick="toggleDagitim()">📋 DAĞITIM</button>
  <div id="tb-info">— kayıt</div>
</div>

<!-- MAP AREA -->
<div id="map-area">
  <!-- Placeholder / upload zone -->
  <div id="map-ph">
    <input type="file" accept="image/*" onchange="loadImg(this)">
    <div class="ph-icon">🏗️</div>
    <p>Harita yüklemek için tıklayın veya sürükleyin</p>
    <small>PNG, JPG desteklenir</small>
  </div>

  <!-- Map + SVG -->
  <div id="map-wrap">
    <img id="plan-img" src="" alt="plan" draggable="false">
    <svg id="svg-ol"></svg>
    <!-- blok badges + markers injected here -->
  </div>

  <!-- Draw hint -->
  <div id="draw-bar">
    <span id="draw-txt">Haritada tıklayarak blok sınırını çizin</span>
    <button onclick="undoPoint()">↩ Geri</button>
    <button onclick="closePoly()" id="btn-close-poly" style="border-color:#4caf82;color:#4caf82">✓ Kapat</button>
    <button onclick="cancelDraw()">✕ İptal</button>
  </div>

  <!-- Zoom -->
  <div id="zoom-wrap">
    <button class="zbtn" onclick="doZoom(1.25)">＋</button>
    <button class="zbtn" onclick="doZoom(0.8)">－</button>
    <button class="zbtn" onclick="resetZoom()" title="Sıfırla">↺</button>
    <button class="zbtn" onclick="fitMap()" title="Sığdır">⊡</button>
  </div>
</div>

<!-- BLOK INFO POPUP (customer list) -->
<div class="popup" id="blok-popup">
  <div class="bp-header">
    <div class="bp-dot" id="bp-dot"></div>
    <div class="bp-title" id="bp-title">Blok</div>
    <button class="bp-close" onclick="closeBlokPopup()">✕</button>
  </div>
  <div id="bp-musteri-list"></div>
  <div class="add-m-row">
    <input type="text" id="new-m-input" placeholder="Müşteri adı ekle…" onkeydown="if(event.key==='Enter')addMusteri()">
    <input type="text" id="new-m-note" placeholder="Not" style="width:80px">
    <button onclick="addMusteri()">+ EKLE</button>
  </div>
</div>

<!-- BLOK NAME POPUP -->
<div class="popup" id="name-popup" style="top:50%;left:50%;transform:translate(-50%,-50%)">
  <h3>BLOK ADI GİR</h3>
  <label>BLOK ADI</label>
  <input type="text" id="name-input" placeholder="örn. A Blok, 1. Blok">
  <div class="popup-btns">
    <button class="btn-cancel" onclick="cancelDraw()">İptal</button>
    <button class="btn-ok" onclick="confirmBlokName()">Kaydet</button>
  </div>
</div>

<!-- DAGITIM PANEL -->
<div id="dagitim-panel">
  <div id="dp-header">
    <h3>📋 DAĞITIM SIRASI</h3>
    <button id="dp-close" onclick="toggleDagitim()">✕</button>
  </div>
  <div id="dp-body"></div>
  <div id="dp-footer" id="dp-footer"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let bloklar    = [];   // {id,name,color,cx%,cy%,points:[{x%,y%}]}
let musteriler = [];   // {id,blokId,adi,not,teslim,order}
let orderSeq   = 0;

let mode = 'view';
let drawPts = [];

let scale = 1, ox = 0, oy = 0;
let panning = false, panSx, panSy, panOx, panOy;

let activeBlokId = null; // for blok popup
let pendingPolyPts = []; // temp during draw

const COLORS = ['#E63329','#3a9fe8','#f5c842','#4caf82','#9b59b6',
                '#e67e22','#1abc9c','#e91e8c','#00bcd4','#ff9800'];
let colorSeq = 0;

// ════════════════════════════════════════════════════
// IMAGE
// ════════════════════════════════════════════════════
function loadImg(input) {
  const file = (input.files||input.dataTransfer?.files||[])[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('plan-img');
    img.onload = () => { fitMap(); renderAll(); };
    img.src = e.target.result;
    document.getElementById('map-wrap').style.display = 'block';
    document.getElementById('map-ph').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// drag-drop on map area
const ma = document.getElementById('map-area');
ma.addEventListener('dragover', e => e.preventDefault());
ma.addEventListener('drop', e => { e.preventDefault(); loadImg(e); });

// ════════════════════════════════════════════════════
// ZOOM / PAN
// ════════════════════════════════════════════════════
function applyT() {
  document.getElementById('map-wrap').style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;
}
function doZoom(f, cx, cy) {
  const area = document.getElementById('map-area').getBoundingClientRect();
  cx = cx ?? area.width/2; cy = cy ?? area.height/2;
  const ns = Math.min(Math.max(scale*f, .1), 10);
  ox = cx - (cx - ox) * (ns/scale);
  oy = cy - (cy - oy) * (ns/scale);
  scale = ns; applyT();
}
function resetZoom() { scale=1; ox=0; oy=0; applyT(); }
function fitMap() {
  const img = document.getElementById('plan-img');
  const area = document.getElementById('map-area').getBoundingClientRect();
  if (!img.naturalWidth) return;
  const sf = Math.min(area.width/img.naturalWidth, area.height/img.naturalHeight) * .95;
  scale = sf;
  ox = (area.width  - img.naturalWidth  * sf) / 2;
  oy = (area.height - img.naturalHeight * sf) / 2;
  applyT();
}

// Pan
ma.addEventListener('mousedown', e => {
  if (mode === 'draw') return;
  if (e.button !== 0) return;
  panning = true; panSx = e.clientX; panSy = e.clientY; panOx = ox; panOy = oy;
  ma.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  ox = panOx + (e.clientX - panSx);
  oy = panOy + (e.clientY - panSy);
  applyT();
});
document.addEventListener('mouseup', () => { panning = false; ma.style.cursor = 'default'; });
ma.addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.1 : 1/1.1, e.clientX - ma.getBoundingClientRect().left, e.clientY - ma.getBoundingClientRect().top);
}, {passive:false});

// ════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════
function startDraw() {
  if (!document.getElementById('plan-img').src || document.getElementById('plan-img').src === location.href) {
    alert('Önce harita yükleyin.'); return;
  }
  mode = 'draw'; drawPts = [];
  document.getElementById('svg-ol').classList.add('can-draw');
  document.getElementById('draw-bar').classList.add('show');
  document.getElementById('btn-draw').classList.add('active');
  document.getElementById('btn-close-poly').style.display = 'none';
  updateDrawSVG();
}

function cancelDraw() {
  mode = 'view'; drawPts = [];
  document.getElementById('svg-ol').classList.remove('can-draw');
  document.getElementById('draw-bar').classList.remove('show');
  document.getElementById('btn-draw').classList.remove('active');
  document.getElementById('name-popup').classList.remove('show');
  renderSVG();
}

function undoPoint() {
  drawPts.pop(); updateDrawSVG();
}

function closePoly() {
  if (drawPts.length < 3) { alert('En az 3 nokta gerekli.'); return; }
  // Show name popup
  document.getElementById('name-popup').classList.add('show');
  setTimeout(() => document.getElementById('name-input').focus(), 50);
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmBlokName();
});

function confirmBlokName() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  document.getElementById('name-input').value = '';
  document.getElementById('name-popup').classList.remove('show');

  const color = COLORS[colorSeq % COLORS.length];
  colorSeq++;

  // centroid
  const cx = drawPts.reduce((s,p)=>s+p.x,0)/drawPts.length;
  const cy = drawPts.reduce((s,p)=>s+p.y,0)/drawPts.length;

  const blok = { id:uid(), name, color, cx, cy, points:[...drawPts] };
  bloklar.push(blok);
  cancelDraw();
  renderAll();
}

// SVG click during draw
document.getElementById('svg-ol').addEventListener('click', e => {
  if (mode !== 'draw') return;
  const img = document.getElementById('plan-img');
  const rect = img.getBoundingClientRect();
  const x = (e.clientX - rect.left) / (img.offsetWidth)  * 100;
  const y = (e.clientY - rect.top)  / (img.offsetHeight) * 100;
  drawPts.push({x, y});
  document.getElementById('btn-close-poly').style.display = drawPts.length >= 3 ? 'inline-block':'none';
  updateDrawSVG();
});

function updateDrawSVG() {
  renderSVG(); // re-render includes draw preview
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function renderAll() {
  renderSVG();
  renderBadges();
  renderDagitim();
  updateInfo();
}

function imgDims() {
  const img = document.getElementById('plan-img');
  return { w: img.offsetWidth || img.naturalWidth || 800,
           h: img.offsetHeight || img.naturalHeight || 600 };
}

function pct2px(p) {
  const {w,h} = imgDims();
  return { x: p.x/100*w, y: p.y/100*h };
}

function renderSVG() {
  const svg = document.getElementById('svg-ol');
  const {w,h} = imgDims();
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  let html = '';

  // Finished blok polygons
  bloklar.forEach(b => {
    if (!b.points || b.points.length < 3) return;
    const pts = b.points.map(p=>{ const q=pct2px(p); return `${q.x},${q.y}`; }).join(' ');
    html += `<polygon points="${pts}" fill="${b.color}20" stroke="${b.color}" stroke-width="2" stroke-dasharray="6,3"/>`;
  });

  // Draw preview
  if (mode === 'draw' && drawPts.length > 0) {
    const color = COLORS[colorSeq % COLORS.length];
    if (drawPts.length >= 2) {
      const pts = drawPts.map(p=>{ const q=pct2px(p); return `${q.x},${q.y}`; }).join(' ');
      html += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-dasharray="6,3"/>`;
    }
    drawPts.forEach((p,i) => {
      const q = pct2px(p);
      html += `<circle cx="${q.x}" cy="${q.y}" r="${i===0?8:5}" fill="${color}" stroke="#fff" stroke-width="2"/>`;
      if (i===0) html += `<circle cx="${q.x}" cy="${q.y}" r="14" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="3,2" opacity=".7"/>`;
    });
    // Close line preview if ≥3 pts
    if (drawPts.length >= 3) {
      const f=pct2px(drawPts[0]), l=pct2px(drawPts[drawPts.length-1]);
      html += `<line x1="${l.x}" y1="${l.y}" x2="${f.x}" y2="${f.y}" stroke="${color}" stroke-width="1.5" stroke-dasharray="4,4" opacity=".5"/>`;
    }
  }

  svg.innerHTML = html;
}

function renderBadges() {
  // Remove old badges
  document.querySelectorAll('.blok-badge').forEach(e=>e.remove());
  const wrap = document.getElementById('map-wrap');

  bloklar.forEach(b => {
    const count = musteriler.filter(m=>m.blokId===b.id).length;
    const badge = document.createElement('div');
    badge.className = 'blok-badge';
    badge.style.left = b.cx + '%';
    badge.style.top  = b.cy + '%';
    badge.innerHTML = `
      <div class="bb-circle" style="background:${b.color};width:${count>0?52:44}px;height:${count>0?52:44}px">
        <span>${esc(b.name)}</span>
      </div>
      <div class="bb-count">${count > 0 ? count+' kişi' : 'boş'}</div>
    `;
    badge.onclick = () => openBlokPopup(b.id);
    wrap.appendChild(badge);
  });
}

function updateInfo() {
  const total  = musteriler.length;
  const teslim = musteriler.filter(m=>m.teslim).length;
  document.getElementById('tb-info').textContent = `${total} müşteri · ${teslim} teslim`;
}

// ════════════════════════════════════════════════════
// BLOK POPUP
// ════════════════════════════════════════════════════
function openBlokPopup(blokId) {
  activeBlokId = blokId;
  const blok = bloklar.find(b=>b.id===blokId);
  document.getElementById('bp-dot').style.background = blok.color;
  document.getElementById('bp-title').textContent = blok.name;

  // Position popup near center
  const popup = document.getElementById('blok-popup');
  popup.style.top  = '50%';
  popup.style.left = '50%';
  popup.style.transform = 'translate(-50%,-50%)';

  renderBlokPopup();
  popup.classList.add('show');
  setTimeout(()=>document.getElementById('new-m-input').focus(),50);
}

function closeBlokPopup() {
  document.getElementById('blok-popup').classList.remove('show');
  activeBlokId = null;
}

function renderBlokPopup() {
  const ms = musteriler.filter(m=>m.blokId===activeBlokId).sort((a,b)=>a.order-b.order);
  const el = document.getElementById('bp-musteri-list');
  if (ms.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:#444;padding:8px 0;font-family:monospace">Henüz müşteri eklenmedi</div>';
    return;
  }
  el.innerHTML = ms.map((m,i) => `
    <div class="musteri-row">
      <div class="m-order">${i+1}.</div>
      <div class="m-info">
        <div class="m-name">${esc(m.adi)}</div>
        ${m.not?`<div class="m-note">${esc(m.not)}</div>`:''}
      </div>
      <button class="m-teslim ${m.teslim?'done':''}" onclick="toggleTeslimPopup('${m.id}')">
        ${m.teslim?'✓ TESLİM':'TESLİM ET'}
      </button>
      <button class="m-edit" onclick="editMusteri('${m.id}')" title="Düzenle">⚙</button>
      <button class="m-del" onclick="delMusteri('${m.id}')" title="Sil">✕</button>
    </div>
  `).join('');
}

function addMusteri() {
  const adi  = document.getElementById('new-m-input').value.trim();
  const not  = document.getElementById('new-m-note').value.trim();
  if (!adi || !activeBlokId) return;
  orderSeq++;
  musteriler.push({ id:uid(), blokId:activeBlokId, adi, not, teslim:false, order:orderSeq });
  document.getElementById('new-m-input').value = '';
  document.getElementById('new-m-note').value = '';
  document.getElementById('new-m-input').focus();
  renderBlokPopup();
  renderBadges();
  renderDagitim();
  updateInfo();
}

function toggleTeslimPopup(id) {
  const m = musteriler.find(x=>x.id===id);
  if (m) m.teslim = !m.teslim;
  renderBlokPopup();
  renderBadges();
  renderDagitim();
  updateInfo();
}

function delMusteri(id) {
  musteriler = musteriler.filter(m=>m.id!==id);
  renderBlokPopup();
  renderBadges();
  renderDagitim();
  updateInfo();
}

function editMusteri(id) {
  const m = musteriler.find(x=>x.id===id);
  const newAdi = prompt('Müşteri adı:', m.adi);
  if (newAdi === null) return;
  if (newAdi.trim()) m.adi = newAdi.trim();
  const newNot = prompt('Not:', m.not||'');
  if (newNot !== null) m.not = newNot.trim();
  renderBlokPopup();
  renderBadges();
  renderDagitim();
}

// ════════════════════════════════════════════════════
// DAĞITIM PANEL
// ════════════════════════════════════════════════════
function toggleDagitim() {
  const panel = document.getElementById('dagitim-panel');
  panel.classList.toggle('show');
  document.getElementById('btn-dagitim').classList.toggle('active', panel.classList.contains('show'));
  if (panel.classList.contains('show')) renderDagitim();
}

function renderDagitim() {
  const sorted = [...musteriler].sort((a,b)=>a.order-b.order);
  const el = document.getElementById('dp-body');
  if (sorted.length === 0) {
    el.innerHTML = '<div style="font-size:11px;color:#333;font-family:monospace;padding:16px;text-align:center">Müşteri ekleyin</div>';
    return;
  }
  let idx = 0;
  el.innerHTML = sorted.map(m => {
    const blok = bloklar.find(b=>b.id===m.blokId);
    const label = m.teslim ? '✓ TESLİM' : `${++idx}. GİDECEK`;
    return `<div class="dp-item ${m.teslim?'teslim':''}">
      <div class="dp-order">${label}</div>
      <div class="dp-name">${esc(m.adi)}</div>
      <div class="dp-blok">${blok?`<span style="color:${blok.color}">●</span> ${esc(blok.name)}`:'—'}${m.not?` · ${esc(m.not)}`:''}</div>
      <div class="dp-actions">
        <button class="dp-up" onclick="moveOrder('${m.id}',-1)">↑</button>
        <button class="dp-dn" onclick="moveOrder('${m.id}',1)">↓</button>
        <button class="dp-teslim ${m.teslim?'done':''}" onclick="toggleTeslimDp('${m.id}')">
          ${m.teslim?'✓ TESLİM EDİLDİ':'📦 TESLİM ET'}
        </button>
      </div>
    </div>`;
  }).join('');

  const total  = musteriler.length;
  const teslim = musteriler.filter(m=>m.teslim).length;
  document.getElementById('dp-footer').innerHTML =
    `Toplam: ${total} &nbsp;·&nbsp; <span style="color:#4caf82">Teslim: ${teslim}</span> &nbsp;·&nbsp; <span style="color:#f5c842">Bekleyen: ${total-teslim}</span>`;
}

function moveOrder(id, dir) {
  const sorted = [...musteriler].sort((a,b)=>a.order-b.order);
  const i = sorted.findIndex(m=>m.id===id);
  const j = i + dir;
  if (j < 0 || j >= sorted.length) return;
  const tmp = sorted[i].order; sorted[i].order = sorted[j].order; sorted[j].order = tmp;
  renderDagitim(); updateInfo();
}

function toggleTeslimDp(id) {
  const m = musteriler.find(x=>x.id===id);
  if (m) m.teslim = !m.teslim;
  renderDagitim(); renderBadges(); updateInfo();
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('plan-img').addEventListener('load', ()=>{ setTimeout(renderAll,50); });

// Close popups on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    cancelDraw();
    closeBlokPopup();
  }
});
</script>
