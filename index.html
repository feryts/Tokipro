<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKİ Blok Bulucu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0f0f;
  color: #e8e8e8;
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
#header {
  background: #1a1a1a;
  border-bottom: 2px solid #E63329;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.badge {
  background: #E63329;
  color: #fff;
  font-weight: 900;
  font-size: 17px;
  letter-spacing: 3px;
  padding: 4px 14px;
}
#header h1 { font-size: 17px; font-weight: 700; letter-spacing: 2px; }
#kayit-say { margin-left: auto; font-size: 11px; color: #666; font-family: monospace; }

/* LAYOUT */
#layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 290px;
  min-width: 290px;
  background: #1a1a1a;
  border-right: 1px solid #2a2a2a;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sec-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #555;
  font-family: monospace;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 10px;
}

/* DROP ZONE */
.dropzone {
  border: 2px dashed #2a2a2a;
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
  position: relative;
}
.dropzone:hover, .dropzone.drag { border-color: #E63329; background: rgba(230,51,41,0.05); }
.dropzone.done { border-color: #4caf82; background: rgba(76,175,130,0.07); }
.dropzone input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.dropzone .dz-icon { font-size: 26px; margin-bottom: 6px; }
.dropzone .dz-label { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.dropzone .dz-hint { font-size: 11px; color: #555; }
.dropzone.done .dz-label { color: #4caf82; }

/* TABS */
.tabs { display: flex; margin-bottom: 10px; }
.tab {
  flex: 1; padding: 7px 0; font-size: 10px; letter-spacing: 1px;
  font-family: monospace; cursor: pointer;
  border: 1px solid #2a2a2a;
  background: transparent; color: #555;
  transition: all 0.15s;
}
.tab.active { background: #E63329; border-color: #E63329; color: #fff; }

.tab-panel { display: none; flex-direction: column; gap: 10px; }
.tab-panel.active { display: flex; }

/* INPUTS */
label.lbl { font-size: 11px; color: #555; font-family: monospace; display: block; margin-bottom: 4px; }
input[type=text], input[type=search] {
  width: 100%;
  background: #111;
  border: 1px solid #2a2a2a;
  color: #e8e8e8;
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #E63329; }

/* BUTTONS */
.btn {
  width: 100%;
  padding: 10px 16px;
  background: #E63329;
  color: #fff;
  border: none;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #c8241b; }
.btn:disabled { background: #333; color: #555; cursor: not-allowed; }
.btn-sm {
  width: 100%;
  padding: 7px 12px;
  background: transparent;
  border: 1px solid #2a2a2a;
  color: #888;
  font-size: 11px;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.2s;
}
.btn-sm:hover { border-color: #e8e8e8; color: #e8e8e8; }

/* STATUS */
.status { font-size: 11px; font-family: monospace; margin-top: 5px; min-height: 16px; }
.ok { color: #4caf82; }
.err { color: #E63329; }
.warn { color: #f5c842; }

/* RESULT CARD */
#result-card {
  background: #111;
  border: 1px solid #2a2a2a;
  border-left: 3px solid #E63329;
  padding: 14px;
  display: none;
  margin-top: 6px;
}
#result-card.show { display: block; }
#r-blok { font-size: 30px; font-weight: 900; color: #E63329; font-family: monospace; line-height: 1; }
#r-adi { font-size: 15px; font-weight: 600; margin-top: 4px; }
#r-warn { font-size: 11px; color: #f5c842; font-family: monospace; margin-top: 5px; }

/* TABLE */
.tbl-wrap { max-height: 150px; overflow-y: auto; margin-top: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th {
  background: #111; color: #555; font-family: monospace;
  font-size: 10px; letter-spacing: 1px; padding: 5px 8px;
  text-align: left; border-bottom: 1px solid #2a2a2a;
  position: sticky; top: 0;
}
td { padding: 5px 8px; border-bottom: 1px solid #1e1e1e; }
tr.hl td { background: rgba(230,51,41,0.15); color: #E63329; font-weight: 700; }

.note {
  font-size: 11px; color: #555; line-height: 1.6;
  padding: 8px; background: #111; border-left: 2px solid #f5c842;
  margin-top: 4px;
}

/* MAP */
#map-area {
  flex: 1; position: relative; overflow: hidden;
  background: #0a0a0a; display: flex;
  align-items: center; justify-content: center;
}
#map-placeholder { text-align: center; color: #333; pointer-events: none; }
#map-placeholder .big { font-size: 60px; opacity: 0.3; }
#map-placeholder p { margin-top: 10px; font-size: 13px; }

#map-container {
  position: relative;
  display: none;
  transform-origin: center center;
  cursor: crosshair;
}
#plan-img {
  display: block;
  max-width: 100%;
  max-height: calc(100vh - 80px);
  user-select: none;
  pointer-events: none;
  draggable: false;
}

/* MARKER */
.marker {
  position: absolute;
  transform: translate(-50%, -100%);
  pointer-events: none;
  animation: markerDrop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes markerDrop {
  from { transform: translate(-50%, -140%); opacity: 0; }
  to   { transform: translate(-50%, -100%); opacity: 1; }
}
.marker-pin {
  width: 22px; height: 22px;
  background: #E63329;
  border: 3px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 3px 12px rgba(230,51,41,0.6);
  margin: 0 auto;
}
.marker-pulse {
  position: absolute;
  top: 50%; left: 50%;
  width: 44px; height: 44px;
  background: rgba(230,51,41,0.25);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 1.6s ease-out infinite;
}
@keyframes pulse {
  0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
}
.marker-lbl {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: #0f0f0f;
  color: #e8e8e8;
  font-family: monospace;
  font-size: 11px; font-weight: 700;
  padding: 3px 8px;
  border: 1px solid #E63329;
  white-space: nowrap;
}

/* Dot markers */
.dot-mk {
  position: absolute;
  width: 8px; height: 8px;
  background: rgba(245,200,66,0.55);
  border: 1px solid rgba(245,200,66,0.9);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

/* Mode bar */
#mode-bar {
  position: absolute; top: 12px; left: 12px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  padding: 7px 14px; font-family: monospace; font-size: 11px;
  display: none; align-items: center; gap: 10px;
}
#mode-bar.show { display: flex; }
.blink {
  width: 8px; height: 8px; border-radius: 50%;
  background: #E63329; animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Zoom */
#zoom-btns {
  position: absolute; bottom: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.zbtn {
  width: 36px; height: 36px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #e8e8e8; font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.zbtn:hover { background: #E63329; }

/* AI overlay */
#ai-overlay {
  position: absolute; inset: 0;
  background: rgba(10,10,10,0.88);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; z-index: 50;
}
#ai-overlay.show { display: flex; }
.spinner {
  width: 46px; height: 46px;
  border: 3px solid #2a2a2a; border-top-color: #E63329;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#ai-overlay p { font-family: monospace; font-size: 12px; color: #555; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #2a2a2a; }
</style>
</head>
<body>

<div id="header">
  <div class="badge">TOKİ</div>
  <h1>BLOK BULUCU</h1>
  <span id="kayit-say">0 kayıt</span>
</div>

<div id="layout">
  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- 01 Plan -->
    <div>
      <div class="sec-title">01 — Vaziyet Planı</div>
      <div class="dropzone" id="img-zone">
        <input type="file" id="img-input" accept="image/*">
        <div class="dz-icon">🗺️</div>
        <div class="dz-label">PNG / JPG Yükle</div>
        <div class="dz-hint">Tıkla veya sürükle-bırak</div>
      </div>
      <div class="status" id="img-status"></div>
      <button class="btn" id="ai-btn" style="display:none;margin-top:8px" onclick="runAI()">
        🤖 AI ile Blokları Tespit Et
      </button>
      <div class="status" id="ai-status"></div>
    </div>

    <!-- 02 Data -->
    <div>
      <div class="sec-title">02 — Müşteri Verileri</div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('csv')">CSV / TXT</button>
        <button class="tab" onclick="switchTab('manuel')">MANUEL</button>
      </div>

      <div class="tab-panel active" id="tab-csv">
        <div class="dropzone" id="csv-zone">
          <input type="file" id="csv-input" accept=".csv,.txt,.xlsx,.xls">
          <div class="dz-icon">📊</div>
          <div class="dz-label">CSV Yükle</div>
          <div class="dz-hint">BlokNo, Ad, Soyad</div>
        </div>
        <div class="note">Format: A-101, Ahmet, Yılmaz</div>
        <div class="status" id="csv-status"></div>
        <div class="tbl-wrap" id="tbl-wrap" style="display:none">
          <table><thead><tr><th>BLOK</th><th>AD SOYAD</th></tr></thead>
          <tbody id="tbl-body"></tbody></table>
        </div>
      </div>

      <div class="tab-panel" id="tab-manuel">
        <div>
          <label class="lbl">BLOK NUMARASI</label>
          <input type="text" id="m-blok" placeholder="örn. A-101">
        </div>
        <div>
          <label class="lbl">AD SOYAD</label>
          <input type="text" id="m-adi" placeholder="Ahmet Yılmaz">
        </div>
        <button class="btn" onclick="addManual()">+ KAYIT EKLE</button>
      </div>
    </div>

    <!-- 03 Search -->
    <div>
      <div class="sec-title">03 — Ara & İşaretle</div>
      <label class="lbl">AD SOYAD veya BLOK NO</label>
      <input type="search" id="search-input" placeholder="Ahmet Yılmaz veya A-101" oninput="doSearch(this.value)">
      <div id="result-card">
        <div id="r-blok">—</div>
        <div id="r-adi">—</div>
        <div id="r-warn"></div>
      </div>
      <div class="status warn" id="cal-note" style="margin-top:6px"></div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map-area">
    <div id="map-placeholder">
      <div class="big">🏗️</div>
      <p>Vaziyet planını sol panelden yükleyin</p>
    </div>

    <div id="map-container">
      <img id="plan-img" src="" alt="Plan">
      <!-- markers buraya eklenir -->
    </div>

    <div id="mode-bar">
      <div class="blink"></div>
      <span id="mode-text"></span>
    </div>

    <div id="zoom-btns">
      <button class="zbtn" onclick="doZoom(1.2)">＋</button>
      <button class="zbtn" onclick="doZoom(0.8)">－</button>
      <button class="zbtn" onclick="resetZoom()" title="Sıfırla">↺</button>
    </div>

    <div id="ai-overlay">
      <div class="spinner"></div>
      <p>Vaziyet planı AI ile analiz ediliyor…</p>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let records = [];
let blockCoords = {};
let currentFound = null;
let imgBase64 = null;
let imgMediaType = 'image/png';
let scale = 1;

// ─── IMAGE UPLOAD ─────────────────────────────────────────────────────────────
const imgInput = document.getElementById('img-input');
const imgZone  = document.getElementById('img-zone');

imgInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  loadImage(file);
});

// Drag & drop on zone
imgZone.addEventListener('dragover', e => { e.preventDefault(); imgZone.classList.add('drag'); });
imgZone.addEventListener('dragleave', () => imgZone.classList.remove('drag'));
imgZone.addEventListener('drop', e => {
  e.preventDefault();
  imgZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  imgMediaType = file.type || 'image/png';
  const reader = new FileReader();
  reader.onload = function(e) {
    const src = e.target.result;
    imgBase64 = src.split(',')[1];

    document.getElementById('plan-img').src = src;
    document.getElementById('map-container').style.display = 'block';
    document.getElementById('map-placeholder').style.display = 'none';

    imgZone.classList.add('done');
    imgZone.querySelector('.dz-label').textContent = '✓ ' + file.name;
    imgZone.querySelector('.dz-hint').textContent = 'Başka dosya için tıkla';
    setStatus('img-status', '✓ Resim yüklendi', 'ok');

    document.getElementById('ai-btn').style.display = 'block';

    // Reset
    clearMarkers();
    clearDots();
    blockCoords = {};
    currentFound = null;
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('mode-bar').classList.remove('show');
    document.getElementById('search-input').value = '';
    setStatus('ai-status', '', '');
    document.getElementById('cal-note').textContent = '';
  };
  reader.readAsDataURL(file);
}

// ─── CSV UPLOAD ───────────────────────────────────────────────────────────────
const csvInput = document.getElementById('csv-input');
csvInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    parseCSV(e.target.result, file.name);
  };
  reader.readAsText(file, 'UTF-8');
});

function parseCSV(text, fname) {
  const lines = text.trim().split('\n');
  const newRecs = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = line.split(/[,;\t]/);
    if (cols.length < 2) continue;
    const first = cols[0].trim().toLowerCase().replace(/\s+/g,'');
    if (['blokno','blok','no'].includes(first)) continue;
    const blok = cols[0].trim().toUpperCase();
    const adi  = cols.slice(1).map(c => c.trim()).filter(Boolean).join(' ');
    if (blok && adi) newRecs.push({ blok, adi });
  }
  if (newRecs.length === 0) {
    setStatus('csv-status', '⚠ Kayıt bulunamadı. Format: BlokNo, Ad, Soyad', 'err');
    return;
  }
  records = records.concat(newRecs);
  refreshTable();
  document.getElementById('csv-zone').classList.add('done');
  document.getElementById('csv-zone').querySelector('.dz-label').textContent = '✓ ' + fname;
  setStatus('csv-status', `✓ ${newRecs.length} kayıt yüklendi`, 'ok');
  document.getElementById('kayit-say').textContent = records.length + ' kayıt';
}

// ─── MANUAL ADD ───────────────────────────────────────────────────────────────
function addManual() {
  const blok = document.getElementById('m-blok').value.trim().toUpperCase();
  const adi  = document.getElementById('m-adi').value.trim();
  if (!blok || !adi) return;
  records.push({ blok, adi });
  refreshTable();
  document.getElementById('m-blok').value = '';
  document.getElementById('m-adi').value = '';
  document.getElementById('kayit-say').textContent = records.length + ' kayıt';
}

document.getElementById('m-adi').addEventListener('keydown', e => {
  if (e.key === 'Enter') addManual();
});

// ─── TABLE ────────────────────────────────────────────────────────────────────
function refreshTable() {
  const tbody = document.getElementById('tbl-body');
  tbody.innerHTML = '';
  records.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + i;
    tr.innerHTML = `<td>${r.blok}</td><td>${r.adi}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('tbl-wrap').style.display = records.length ? 'block' : 'none';
}

// ─── AI DETECT ────────────────────────────────────────────────────────────────
async function runAI() {
  if (!imgBase64) return;
  document.getElementById('ai-overlay').classList.add('show');
  document.getElementById('ai-btn').disabled = true;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: imgMediaType, data: imgBase64 }
            },
            {
              type: 'text',
              text: `Bu bir TOKİ vaziyet planı görseli. Görüntüdeki TÜM blok numaralarını veya bina etiketlerini tespit et. Her birinin görüntü içindeki konumunu yüzde (%) olarak ver. Sol üst köşe = (0,0), sağ alt = (100,100).

SADECE geçerli JSON döndür, başka hiçbir şey yazma:
{"blocks":[{"blok":"A-101","x":25.5,"y":40.2},{"blok":"B-202","x":60.1,"y":55.8}]}

Gördüğün tüm blok/bina/daire numaralarını ekle.`
            }
          ]
        }]
      })
    });

    const data = await resp.json();
    const txt = (data.content || []).map(c => c.text || '').join('');
    const clean = txt.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('ai-overlay').classList.remove('show');

    if (parsed.blocks && parsed.blocks.length > 0) {
      parsed.blocks.forEach(b => {
        blockCoords[b.blok.toUpperCase()] = { x: b.x, y: b.y };
      });
      renderDots(parsed.blocks);
      setStatus('ai-status', `✓ ${parsed.blocks.length} blok tespit edildi`, 'ok');
      document.getElementById('ai-btn').textContent = `✓ ${parsed.blocks.length} blok bulundu`;
      document.getElementById('ai-btn').disabled = true;
      document.getElementById('cal-note').textContent = 'İpucu: Yanlış konumlar için bloğu arayıp haritada doğru yere tıklayın.';
    } else {
      setStatus('ai-status', '⚠ Blok tespit edilemedi. Manuel konumlandırın.', 'warn');
      document.getElementById('ai-btn').disabled = false;
    }
  } catch (err) {
    document.getElementById('ai-overlay').classList.remove('show');
    setStatus('ai-status', '✗ AI hatası: ' + err.message, 'err');
    document.getElementById('ai-btn').disabled = false;
    console.error(err);
  }
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function doSearch(val) {
  const q = val.trim().toUpperCase();

  if (!q) {
    currentFound = null;
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('mode-bar').classList.remove('show');
    clearMarkers();
    document.querySelectorAll('#tbl-body tr').forEach(r => r.classList.remove('hl'));
    return;
  }

  let rec = records.find(r => r.blok === q);
  if (!rec) rec = records.find(r => r.adi.toUpperCase().includes(q));

  if (rec) {
    currentFound = rec;
    document.getElementById('r-blok').textContent = rec.blok;
    document.getElementById('r-adi').textContent = rec.adi;

    const coords = findCoords(rec.blok);
    if (coords) {
      document.getElementById('r-warn').textContent = '';
      placeMarker(coords.x, coords.y, rec.blok);
      showModeBar(`BLOK ${rec.blok} — ${rec.adi}`);
    } else {
      document.getElementById('r-warn').textContent = '⚠ Konum bilinmiyor — haritada tıklayın';
      clearMarkers();
      document.getElementById('mode-bar').classList.remove('show');
    }

    document.getElementById('result-card').classList.add('s
