<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TOKİ HARİTA SİSTEMİ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252a35;
    --accent: #f0c040;
    --accent2: #e06030;
    --green: #40d080;
    --red: #e04050;
    --blue: #4090f0;
    --text: #e8ecf4;
    --muted: #6a7280;
    --radius: 10px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 50;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text); opacity: .5; font-weight: 400; }
  .header-stats {
    display: flex;
    gap: 8px;
    margin-left: auto;
    flex-wrap: nowrap;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .stat-chip b { color: var(--text); font-weight: 700; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 40;
  }
  .sidebar.hidden { transform: translateX(-100%); }
  @media (max-width: 700px) {
    .sidebar {
      position: absolute;
      top: 53px;
      left: 0;
      bottom: 0;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-panel.active { display: flex; }

  .panel-header {
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .list-scroll::-webkit-scrollbar { width: 4px; }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .list-item:hover { background: var(--surface2); }
  .list-item.selected { background: var(--surface2); border-color: var(--accent); }

  .item-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 2px;
  }
  .item-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
    transition: all .15s;
    flex-shrink: 0;
  }
  .item-del:hover { color: var(--red); background: rgba(224,64,80,.1); }

  /* ── FORM AREA ── */
  .form-area {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .form-row { display: flex; gap: 8px; }
  .form-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--font-head);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  .btn {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .3px;
    border: none;
    border-radius: 7px;
    padding: 9px 14px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #f8d060; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(224,64,80,.15); color: var(--red); border: 1px solid rgba(224,64,80,.3); }
  .btn-danger:hover { background: rgba(224,64,80,.3); }
  .btn-green { background: rgba(64,208,128,.15); color: var(--green); border: 1px solid rgba(64,208,128,.3); }
  .btn-green:hover { background: rgba(64,208,128,.3); }
  .btn-full { width: 100%; justify-content: center; }

  .color-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .color-label { font-size: 11px; color: var(--muted); }
  .color-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .15s, border-color .15s;
  }
  .color-swatch.selected { border-color: white; transform: scale(1.2); }

  /* ── MAP AREA ── */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #mapCanvas {
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
    cursor: crosshair;
  }
  #mapCanvas.pan-mode { cursor: grab; }
  #mapCanvas.pan-mode:active { cursor: grabbing; }

  /* ── MAP TOOLBAR ── */
  .map-toolbar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    z-index: 20;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .tool-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    position: relative;
  }
  .tool-btn:hover { background: var(--surface2); color: var(--text); }
  .tool-btn.active { background: var(--accent); color: #000; }
  .tool-sep { width: 1px; background: var(--border); margin: 4px 2px; }

  /* ── ZOOM CONTROLS ── */
  .zoom-btns {
    position: absolute;
    right: 14px;
    bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 20;
  }
  .zoom-btn {
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    line-height: 1;
    font-family: var(--font-mono);
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SIDEBAR TOGGLE (mobile) ── */
  .menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    padding: 2px 6px;
  }
  @media (max-width: 700px) { .menu-btn { display: flex; } }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 380px;
    overflow: hidden;
    animation: slideUp .25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
  .modal-head {
    padding: 16px 20px;
    font-size: 14px;
    font-weight: 800;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  .modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }

  /* ── TOOLTIP ── */
  .tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    z-index: 30;
    min-width: 120px;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    display: none;
  }
  .tooltip-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .tooltip-row { color: var(--muted); font-family: var(--font-mono); font-size: 10px; }

  /* ── TOAST ── */
  .toast-area {
    position: fixed;
    top: 60px;
    right: 16px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    animation: toastIn .2s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 240px;
  }
  @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--muted);
    text-align: center;
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: .4; }
  .empty-text { font-size: 13px; }

  /* ── BACKUP PANEL ── */
  .backup-actions { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .backup-info { padding: 10px 12px; background: var(--surface2); border-radius: 8px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); line-height: 1.7; }

  /* Legend */
  .legend {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(17,19,24,.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 10px;
    z-index: 10;
    min-width: 110px;
    backdrop-filter: blur(8px);
  }
  .legend-title { font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; font-size: 9px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .mobile-fab {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 16px;
    z-index: 30;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #000;
    font-size: 22px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(240,192,64,.4);
    font-weight: 800;
  }
  @media (max-width: 700px) { .mobile-fab { display: flex; } }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo">TOKİ <span>HARİTA</span></div>
  <div class="header-stats">
    <div class="stat-chip">Blok: <b id="statBlok">0</b></div>
    <div class="stat-chip">Müşteri: <b id="statMus">0</b></div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('blok')">📦 BLOKLAR</button>
      <button class="tab-btn" onclick="switchTab('musteri')">👥 MÜŞTERİ</button>
      <button class="tab-btn" onclick="switchTab('yedek')">💾 YEDEK</button>
    </div>

    <!-- BLOK TAB -->
    <div class="tab-panel active" id="tab-blok">
      <div class="panel-header">Kayıtlı Bloklar</div>
      <div class="list-scroll" id="blokList"></div>
      <div class="form-area">
        <div class="form-row">
          <input class="form-input" id="blokAd" placeholder="Blok adı (örn: A-12)" />
        </div>
        <div class="form-row">
          <input class="form-input" id="blokNot" placeholder="Not (opsiyonel)" />
        </div>
        <div class="color-row">
          <span class="color-label">Renk:</span>
          <div class="color-swatch selected" style="background:#f0c040" data-color="#f0c040" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#4090f0" data-color="#4090f0" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#40d080" data-color="#40d080" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#e04050" data-color="#e04050" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#c070f0" data-color="#c070f0" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#f0a040" data-color="#f0a040" onclick="selectColor(this)"></div>
        </div>
        <div class="form-row">
          <button class="btn btn-primary btn-full" onclick="addBlok()">✚ Blok Ekle</button>
        </div>
        <div class="form-row">
          <button class="btn btn-secondary btn-full" style="font-size:11px;" onclick="clearAll()">🗑 Tüm Blokları Sil</button>
        </div>
      </div>
    </div>

    <!-- MÜŞTERİ TAB -->
    <div class="tab-panel" id="tab-musteri">
      <div class="panel-header">Müşteri Listesi</div>
      <div class="list-scroll" id="musteriList"></div>
      <div class="form-area">
        <input class="form-input" id="musAd" placeholder="Müşteri adı" />
        <input class="form-input" id="musBlok" placeholder="Blok no" />
        <button class="btn btn-primary btn-full" onclick="addMusteri()">✚ Müşteri Ekle</button>
      </div>
    </div>

    <!-- YEDEK TAB -->
    <div class="tab-panel" id="tab-yedek">
      <div class="panel-header">Yedekleme & Geri Yükleme</div>
      <div class="backup-actions">
        <div class="backup-info" id="backupInfo">Veri yüklenmiyor...</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:4px 0 2px">🗺 Harita Görseli</div>
        <button class="btn btn-secondary btn-full" onclick="document.getElementById('mapImgInput').click()">🖼 PNG Harita Yükle</button>
        <input type="file" id="mapImgInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none" onchange="loadMapImage(event)">
        <button class="btn btn-secondary btn-full" onclick="removeMapImage()" id="removeImgBtn" style="display:none">✕ Harita Görselini Kaldır</button>
        <div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 0 2px">💾 Veri Yedekleme</div>
        <button class="btn btn-green btn-full" onclick="saveBackup()">⬇ Yedek Al (JSON)</button>
        <button class="btn btn-secondary btn-full" onclick="document.getElementById('jsonInput').click()">⬆ Yedek Yükle (JSON)</button>
        <input type="file" id="jsonInput" accept=".json,application/json" style="display:none" onchange="loadBackup(event)">
        <button class="btn btn-danger btn-full" onclick="confirmReset()">⚠ Sistemi Sıfırla</button>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap" id="mapWrap">
    <canvas id="mapCanvas"></canvas>

    <!-- Legend -->
    <div class="legend" id="legend"></div>

    <!-- Map toolbar -->
    <div class="map-toolbar">
      <button class="tool-btn active" id="toolPan" onclick="setTool('pan')" title="Kaydır">🖐</button>
      <button class="tool-btn" id="toolDraw" onclick="setTool('draw')" title="Çiz">✏️</button>
      <button class="tool-btn" id="toolPin" onclick="setTool('pin')" title="Blok Koy">📍</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="toolErase" onclick="setTool('erase')" title="Sil">🧹</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="clearCanvas()" title="Haritayı Temizle">🗺</button>
      <button class="tool-btn" onclick="resetView()" title="Görünümü Sıfırla">⌂</button>
    </div>

    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoom(1.2)">+</button>
      <button class="zoom-btn" onclick="zoom(0.83)">−</button>
    </div>

    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<!-- FAB (mobile) -->
<button class="mobile-fab" onclick="openPinModal()">📍</button>

<!-- TOAST AREA -->
<div class="toast-area" id="toastArea"></div>

<!-- BLOK MODAL (harita üzerine pin koyarken) -->
<div class="modal-backdrop" id="pinModal">
  <div class="modal">
    <div class="modal-head">
      📍 Blok Yerleştir
      <button class="modal-close" onclick="closePinModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--muted)">Hangi bloğu bu konuma eklemek istiyorsunuz?</p>
      <select class="form-input" id="pinBlokSelect" style="cursor:pointer"></select>
      <input class="form-input" id="pinLabel" placeholder="Etiket (opsiyonel)" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="confirmPin()">Yerleştir</button>
      <button class="btn btn-secondary" onclick="closePinModal()">İptal</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <div class="modal-head">
      ⚠️ <span id="confirmTitle">Emin misiniz?</span>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="font-size:13px;color:var(--muted)"></p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1" id="confirmOk" onclick="doConfirm()">Evet, Devam Et</button>
      <button class="btn btn-secondary" onclick="closeConfirm()">İptal</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let state = {
  bloklar: [],    // {id, ad, not, renk}
  musteriler: [], // {id, ad, tel, blok}
  pins: [],       // {id, blokId, x, y, label}
  drawings: [],   // [{tool, points, color}]
  nextId: 1
};

// ── CANVAS ──
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let vp = { x: 0, y: 0, scale: 1 }; // viewport
let activeTool = 'pan';
let isPainting = false;
let currentStroke = null;
let pendingPin = null; // {x, y} in world coords
let panStart = null;
let vpStart = null;
let lastTouch = null;
let pinchStart = null;

function resize() {
  const wrap = document.getElementById('mapWrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}
window.addEventListener('resize', resize);
resize();

// ── RENDER ──
let mapImage = null; // HTMLImageElement, not persisted in JSON (too large)

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(vp.x, vp.y);
  ctx.scale(vp.scale, vp.scale);

  // Background map image
  if (mapImage) {
    ctx.globalAlpha = 0.85;
    ctx.drawImage(mapImage, 0, 0);
    ctx.globalAlpha = 1;
  }
  for (const d of state.drawings) {
    if (!d.points || d.points.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(d.points[0].x, d.points[0].y);
    for (let i = 1; i < d.points.length; i++) ctx.lineTo(d.points[i].x, d.points[i].y);
    ctx.strokeStyle = d.color || '#4090f0';
    ctx.lineWidth = (d.tool === 'erase' ? 24 : 3) / vp.scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (d.tool === 'erase') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else {
      ctx.stroke();
    }
  }

  // Current stroke
  if (currentStroke && currentStroke.points.length > 1) {
    ctx.beginPath();
    ctx.moveTo(currentStroke.points[0].x, currentStroke.points[0].y);
    for (let i = 1; i < currentStroke.points.length; i++) ctx.lineTo(currentStroke.points[i].x, currentStroke.points[i].y);
    ctx.strokeStyle = currentStroke.color || '#4090f0';
    ctx.lineWidth = (currentStroke.tool === 'erase' ? 24 : 3) / vp.scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (currentStroke.tool === 'erase') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else ctx.stroke();
  }

  // Pins
  for (const pin of state.pins) {
    const blok = state.bloklar.find(b => b.id === pin.blokId);
    const color = blok ? blok.renk : '#f0c040';
    const label = pin.label || (blok ? blok.ad : '?');

    // Shadow
    ctx.shadowColor = color;
    ctx.shadowBlur = 12 / vp.scale;

    // Circle
    ctx.beginPath();
    ctx.arc(pin.x, pin.y, 14 / vp.scale, 0, Math.PI * 2);
    ctx.fillStyle = color + '33';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(pin.x, pin.y, 10 / vp.scale, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.shadowBlur = 0;

    // Label
    ctx.font = `bold ${11 / vp.scale}px Syne, sans-serif`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label.length > 6 ? label.slice(0, 5) + '…' : label, pin.x, pin.y);

    ctx.textBaseline = 'alphabetic';
  }

  ctx.restore();
}

// ── TOOL ──
let drawColor = '#4090f0';

function setTool(t) {
  activeTool = t;
  document.querySelectorAll('.tool-btn[id^=tool]').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tool' + t.charAt(0).toUpperCase() + t.slice(1));
  if (el) el.classList.add('active');
  canvas.classList.toggle('pan-mode', t === 'pan');
}

// ── CANVAS EVENTS ──
function getWorld(cx, cy) {
  return { x: (cx - vp.x) / vp.scale, y: (cy - vp.y) / vp.scale };
}

canvas.addEventListener('mousedown', e => {
  const p = getWorld(e.offsetX, e.offsetY);
  if (activeTool === 'pan') {
    isPainting = true;
    panStart = { x: e.clientX, y: e.clientY };
    vpStart = { ...vp };
  } else if (activeTool === 'draw' || activeTool === 'erase') {
    isPainting = true;
    currentStroke = { tool: activeTool, color: drawColor, points: [p] };
  } else if (activeTool === 'pin') {
    pendingPin = p;
    openPinModal();
  }
});

canvas.addEventListener('mousemove', e => {
  if (!isPainting) {
    // hover tooltip
    const p = getWorld(e.offsetX, e.offsetY);
    showTooltip(e.clientX, e.clientY, p);
    return;
  }
  if (activeTool === 'pan') {
    vp.x = vpStart.x + (e.clientX - panStart.x);
    vp.y = vpStart.y + (e.clientY - panStart.y);
    render();
  } else if (activeTool === 'draw' || activeTool === 'erase') {
    const p = getWorld(e.offsetX, e.offsetY);
    currentStroke.points.push(p);
    render();
  }
});

canvas.addEventListener('mouseup', endStroke);
canvas.addEventListener('mouseleave', () => { isPainting = false; hideTooltip(); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  zoomAt(factor, mx, my);
}, { passive: false });

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    pinchStart = { dist: hypot(e.touches), scale: vp.scale, x: vp.x, y: vp.y,
      mx: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      my: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
    isPainting = false;
    return;
  }
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const ox = t.clientX - rect.left, oy = t.clientY - rect.top;
  const p = getWorld(ox, oy);
  lastTouch = { x: t.clientX, y: t.clientY, ox, oy };
  if (activeTool === 'pan') {
    isPainting = true;
    panStart = { x: t.clientX, y: t.clientY };
    vpStart = { ...vp };
  } else if (activeTool === 'draw' || activeTool === 'erase') {
    isPainting = true;
    currentStroke = { tool: activeTool, color: drawColor, points: [p] };
  } else if (activeTool === 'pin') {
    pendingPin = p;
    openPinModal();
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchStart) {
    const d = hypot(e.touches);
    const factor = d / pinchStart.dist;
    const rect = canvas.getBoundingClientRect();
    const mx = pinchStart.mx - rect.left, my = pinchStart.my - rect.top;
    vp.scale = Math.max(0.15, Math.min(8, pinchStart.scale * factor));
    vp.x = mx - (mx - pinchStart.x) * (vp.scale / pinchStart.scale);
    vp.y = my - (my - pinchStart.y) * (vp.scale / pinchStart.scale);
    render();
    return;
  }
  if (!isPainting) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const ox = t.clientX - rect.left, oy = t.clientY - rect.top;
  if (activeTool === 'pan') {
    vp.x = vpStart.x + (t.clientX - panStart.x);
    vp.y = vpStart.y + (t.clientY - panStart.y);
    render();
  } else if (activeTool === 'draw' || activeTool === 'erase') {
    currentStroke.points.push(getWorld(ox, oy));
    render();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => { pinchStart = null; endStroke(); });

function hypot(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function endStroke() {
  if (!isPainting) return;
  isPainting = false;
  if (currentStroke && currentStroke.points.length > 1) {
    state.drawings.push(currentStroke);
    save();
  }
  currentStroke = null;
  render();
}

// ── ZOOM ──
function zoom(factor) {
  zoomAt(factor, canvas.width / 2, canvas.height / 2);
}
function zoomAt(factor, mx, my) {
  const newScale = Math.max(0.15, Math.min(8, vp.scale * factor));
  vp.x = mx - (mx - vp.x) * (newScale / vp.scale);
  vp.y = my - (my - vp.y) * (newScale / vp.scale);
  vp.scale = newScale;
  render();
}
function resetView() {
  vp = { x: 0, y: 0, scale: 1 };
  render();
}
function clearCanvas() {
  state.drawings = [];
  save(); render();
  toast('Harita çizimi temizlendi', 'info');
}

// ── TOOLTIP ──
function showTooltip(cx, cy, wp) {
  const nearby = state.pins.find(p => {
    const dx = (p.x - wp.x), dy = (p.y - wp.y);
    return Math.sqrt(dx * dx + dy * dy) < 16 / vp.scale;
  });
  const tip = document.getElementById('tooltip');
  if (!nearby) { tip.style.display = 'none'; return; }
  const blok = state.bloklar.find(b => b.id === nearby.blokId);
  const mus = state.musteriler.filter(m => m.blok === (blok ? blok.ad : ''));
  tip.innerHTML = `<div class="tooltip-name" style="color:${blok ? blok.renk : '#f0c040'}">${blok ? blok.ad : '?'}</div>
    ${blok && blok.not ? `<div class="tooltip-row">📝 ${blok.not}</div>` : ''}
    ${mus.length ? `<div class="tooltip-row">👥 ${mus.map(m => m.ad).join(', ')}</div>` : ''}
    ${nearby.label ? `<div class="tooltip-row">🏷 ${nearby.label}</div>` : ''}`;
  tip.style.display = 'block';
  const rect = canvas.getBoundingClientRect();
  const lx = cx - rect.left + 14, ly = cy - rect.top - 20;
  tip.style.left = Math.min(lx, canvas.width - 150) + 'px';
  tip.style.top = Math.max(ly, 4) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

// ── PIN MODAL ──
function openPinModal() {
  const sel = document.getElementById('pinBlokSelect');
  sel.innerHTML = state.bloklar.length
    ? state.bloklar.map(b => `<option value="${b.id}">${b.ad}</option>`).join('')
    : '<option value="">— Önce blok ekleyin —</option>';
  document.getElementById('pinLabel').value = '';
  document.getElementById('pinModal').classList.add('open');
}
function closePinModal() {
  pendingPin = null;
  document.getElementById('pinModal').classList.remove('open');
}
function confirmPin() {
  if (!pendingPin) return;
  const blokId = parseInt(document.getElementById('pinBlokSelect').value);
  if (!blokId) { toast('Blok seçin', 'error'); return; }
  const label = document.getElementById('pinLabel').value.trim();
  state.pins.push({ id: state.nextId++, blokId, x: pendingPin.x, y: pendingPin.y, label });
  save(); render(); closePinModal();
  toast('Pin eklendi', 'success');
}

// ── BLOK ──
let selectedColor = '#f0c040';
function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
  drawColor = selectedColor;
}

function addBlok() {
  const ad = document.getElementById('blokAd').value.trim();
  if (!ad) { toast('Blok adı girin', 'error'); return; }
  if (state.bloklar.find(b => b.ad === ad)) { toast('Bu blok zaten var', 'error'); return; }
  const not = document.getElementById('blokNot').value.trim();
  state.bloklar.push({ id: state.nextId++, ad, not, renk: selectedColor });
  document.getElementById('blokAd').value = '';
  document.getElementById('blokNot').value = '';
  save(); renderLists(); updateStats();
  toast(`"${ad}" eklendi`, 'success');
}

function deleteBlok(id) {
  state.bloklar = state.bloklar.filter(b => b.id !== id);
  state.pins = state.pins.filter(p => p.blokId !== id);
  save(); render(); renderLists(); updateStats();
  toast('Blok silindi', 'info');
}

function clearAll() {
  confirmAction('Tüm Blokları Sil', 'Tüm bloklar ve pinler silinecek. Bu işlem geri alınamaz.', () => {
    state.bloklar = []; state.pins = [];
    save(); render(); renderLists(); updateStats();
    toast('Temizlendi', 'info');
  });
}

// ── MÜŞTERİ ──
function addMusteri() {
  const ad = document.getElementById('musAd').value.trim();
  if (!ad) { toast('Müşteri adı girin', 'error'); return; }
  const blok = document.getElementById('musBlok').value.trim();
  state.musteriler.push({ id: state.nextId++, ad, blok });
  document.getElementById('musAd').value = '';
  document.getElementById('musBlok').value = '';
  save(); renderLists(); updateStats();
  toast(`"${ad}" eklendi`, 'success');
}

function deleteMusteri(id) {
  state.musteriler = state.musteriler.filter(m => m.id !== id);
  save(); renderLists(); updateStats();
  toast('Müşteri silindi', 'info');
}

// ── RENDER LISTS ──
function renderLists() {
  // Bloklar
  const bl = document.getElementById('blokList');
  if (!state.bloklar.length) {
    bl.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Henüz blok yok.<br>Aşağıdan ekleyebilirsiniz.</div></div>`;
  } else {
    bl.innerHTML = state.bloklar.map(b => {
      const pinCount = state.pins.filter(p => p.blokId === b.id).length;
      const musCount = state.musteriler.filter(m => m.blok === b.ad).length;
      return `<div class="list-item">
        <div class="item-dot" style="background:${b.renk}"></div>
        <div class="item-info">
          <div class="item-name">${b.ad}</div>
          <div class="item-meta">${pinCount} pin · ${musCount} müşteri${b.not ? ' · ' + b.not : ''}</div>
        </div>
        <button class="item-del" onclick="deleteBlok(${b.id})">×</button>
      </div>`;
    }).join('');
  }

  // Müşteriler
  const ml = document.getElementById('musteriList');
  if (!state.musteriler.length) {
    ml.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Henüz müşteri yok.</div></div>`;
  } else {
    ml.innerHTML = state.musteriler.map(m => {
      const blok = state.bloklar.find(b => b.ad === m.blok);
      const color = blok ? blok.renk : '#6a7280';
      return `<div class="list-item">
        <div class="item-dot" style="background:${color}"></div>
        <div class="item-info">
          <div class="item-name">${m.ad}</div>
          <div class="item-meta">Blok: ${m.blok || '—'}</div>
        </div>
        <button class="item-del" onclick="deleteMusteri(${m.id})">×</button>
      </div>`;
    }).join('');
  }

  // Legend
  const leg = document.getElementById('legend');
  if (!state.bloklar.length) { leg.style.display = 'none'; return; }
  leg.style.display = 'block';
  leg.innerHTML = `<div class="legend-title">Bloklar</div>` +
    state.bloklar.slice(0, 8).map(b => `<div class="legend-item"><div class="legend-dot" style="background:${b.renk}"></div><span style="font-size:10px">${b.ad}</span></div>`).join('') +
    (state.bloklar.length > 8 ? `<div style="font-size:9px;color:var(--muted);margin-top:4px">+${state.bloklar.length - 8} daha…</div>` : '');

  updateBackupInfo();
}

function updateStats() {
  document.getElementById('statBlok').textContent = state.bloklar.length;
  document.getElementById('statMus').textContent = state.musteriler.length;
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['blok', 'musteri', 'yedek'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── BACKUP ──
function saveBackup() {
  const json = JSON.stringify(state, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = `toki-yedek-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Yedek indirildi', 'success');
}

function loadBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.bloklar || !data.musteriler) throw new Error('Geçersiz format');
      state = { bloklar: [], musteriler: [], pins: [], drawings: [], nextId: 1, ...data };
      save(); renderLists(); render(); updateStats();
      toast('Yedek başarıyla yüklendi', 'success');
    } catch(err) { toast('Geçersiz yedek dosyası', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = ''; // reset so same file can be re-selected
}

// ── MAP IMAGE ──
function loadMapImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      mapImage = img;
      // Store base64 in localStorage for persistence
      try { localStorage.setItem('tokiMapImg', ev.target.result); } catch(err) {
        toast('Görsel çok büyük, kaydedilemedi ama kullanılabilir', 'info');
      }
      document.getElementById('removeImgBtn').style.display = '';
      render();
      toast('Harita görseli yüklendi', 'success');
    };
    img.onerror = () => toast('Görsel yüklenemedi', 'error');
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeMapImage() {
  mapImage = null;
  try { localStorage.removeItem('tokiMapImg'); } catch {}
  document.getElementById('removeImgBtn').style.display = 'none';
  render();
  toast('Harita görseli kaldırıldı', 'info');
}

function loadSavedMapImage() {
  try {
    const src = localStorage.getItem('tokiMapImg');
    if (!src) return;
    const img = new Image();
    img.onload = () => {
      mapImage = img;
      document.getElementById('removeImgBtn').style.display = '';
      render();
    };
    img.src = src;
  } catch {}
}

function confirmReset() {
  confirmAction('Sistemi Sıfırla', 'Tüm veriler (bloklar, müşteriler, çizimler, pinler) silinecek. Geri alınamaz.', () => {
    state = { bloklar: [], musteriler: [], pins: [], drawings: [], nextId: 1 };
    save(); renderLists(); render(); updateStats();
    toast('Sistem sıfırlandı', 'info');
  });
}

function updateBackupInfo() {
  const json = JSON.stringify(state);
  const kb = (new Blob([json]).size / 1024).toFixed(1);
  document.getElementById('backupInfo').innerHTML =
    `Blok: ${state.bloklar.length}\nMüşteri: ${state.musteriler.length}\nPin: ${state.pins.length}\nÇizgi: ${state.drawings.length}\nVeri: ~${kb} KB`;
}

// ── CONFIRM ──
let confirmCallback = null;
function confirmAction(title, msg, cb) {
  confirmCallback = cb;
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('open');
}
function doConfirm() { closeConfirm(); if (confirmCallback) confirmCallback(); confirmCallback = null; }
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); }

// ── TOAST ──
function toast(msg, type = 'info') {
  const area = document.getElementById('toastArea');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  t.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${msg}</span>`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── PERSIST ──
function save() {
  try { localStorage.setItem('tokiState', JSON.stringify(state)); } catch {}
}
function load() {
  try {
    const d = localStorage.getItem('tokiState');
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch {}
}

// ── INIT ──
load();
renderLists();
render();
updateStats();
loadSavedMapImage();
</script>
</body>
</html>
